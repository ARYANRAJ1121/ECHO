<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO — Cinematic Platform Tour</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0B0B0B;
            color: #F3F4F6;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* ── Glassmorphism UI ── */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
        }

        /* ── Floating Labels (Synced with 3D objects) ── */
        .label {
            position: absolute;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            text-align: center;
        }
        .label-title {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #ffffff;
            margin-bottom: 4px;
        }
        .label-subtitle {
            font-size: 0.7rem;
            color: #9CA3AF;
        }

        /* ── Specific Overlays ── */
        .scratchpad-card {
            position: absolute;
            top: 50%; left: 50%;
            width: 260px;
            transform: translate(20px, -50%);
            opacity: 0;
            z-index: 10;
        }
        .scratchpad-card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9CA3AF;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .scratchpad-card p {
            font-size: 0.8rem;
            line-height: 1.6;
            color: #D1D5DB;
        }
        .scratchpad-card .highlight { color: #A78BFA; }

        .lambda-gauge {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            z-index: 5;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0); /* animated to red */
            transition: box-shadow 2s ease;
        }
        .lambda-gauge .value {
            font-size: 1.8rem;
            font-weight: 600;
            color: #fff;
        }
        .lambda-gauge .title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9CA3AF;
        }
        .lambda-gauge.danger {
            border-color: rgba(239, 68, 68, 0.8);
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.4);
        }

        /* ── Presentation Controls ── */
        .controls-bar {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem 2rem;
            border-radius: 100px;
        }
        .btn {
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .btn:hover { background: rgba(255,255,255,0.15); }
        .btn svg { width: 16px; height: 16px; fill: currentColor; }
        
        .progress-container {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #fff;
            border-radius: 2px;
        }

        /* ── Header ── */
        .top-header {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 100;
        }
        .top-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .top-header p {
            font-size: 0.8rem;
            color: #9CA3AF;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="top-header">
        <h1>ECHO</h1>
        <p>Emergent Collusion in Heterogeneous Oligopolies</p>
    </div>

    <!-- UI Overlays -->
    <div id="labels-container"></div>

    <div id="scratchpad" class="glass-panel scratchpad-card">
        <h3>Agent Reasoning</h3>
        <p>"Market prices are stabilizing around $3.20. If I <span class="highlight">undercut</span>, a price war begins. Optimal strategy: <span class="highlight">maintain high prices</span> to signal cooperation."</p>
    </div>

    <div id="lambda-gauge" class="glass-panel lambda-gauge">
        <div class="value" id="lambda-val">0.0</div>
        <div class="title">Collusion (λ)</div>
    </div>

    <!-- Controls -->
    <div class="glass-panel controls-bar">
        <button class="btn" id="playBtn">
            <!-- Pause Icon (Default as it auto-plays) -->
            <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <button class="btn" id="replayBtn">
            <!-- Replay Icon -->
            <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        </button>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
    /* ═══════════════════════════════════════════════════════
       ECHO — Cinematic Vercel/Stripe-Style Visualization
       ═══════════════════════════════════════════════════════ */

    // ── Setup ──
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    // No fog, pure dark #0B0B0B background
    scene.background = new THREE.Color(0x0b0b0b);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 20); // Initial far shot

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    container.appendChild(renderer.domElement);

    // ── Lighting (Soft Studio Setup) ──
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x8b5cf6, 0.3);
    fillLight.position.set(-10, 0, -10);
    scene.add(fillLight);

    // ── Materials (Frosted Glass / Premium Solid) ──
    const glassMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        metalness: 0.1,
        roughness: 0.2,
        transmission: 0.9, // glass effect
        ior: 1.5,
        thickness: 0.5,
        transparent: true,
        opacity: 1
    });

    const solidMaterial = new THREE.MeshStandardMaterial({
        color: 0x1f2937,
        metalness: 0.8,
        roughness: 0.2,
    });

    const highlightMaterial = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0xffffff,
        emissiveIntensity: 0.5
    });

    // ── Objects Dictionary ──
    const objects = {};
    const htmlLabels = [];
    const particleSystems = [];

    // Helper: Create Node + Label
    function createNode(id, geometry, material, pos, labelTitle, labelSub) {
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(...pos);
        mesh.scale.set(0.01, 0.01, 0.01); // Start hidden for intro animation
        scene.add(mesh);
        objects[id] = mesh;

        // HTML Label
        const div = document.createElement('div');
        div.className = 'label';
        div.innerHTML = `<div class="label-title">${labelTitle}</div><div class="label-subtitle">${labelSub}</div>`;
        document.getElementById('labels-container').appendChild(div);
        htmlLabels.push({ mesh, div });

        return mesh;
    }

    // 1. Market Engine (Center)
    createNode('engine', new THREE.BoxGeometry(2, 2, 2), glassMaterial, [0, 0, 0], 'Market Engine', 'Multinomial Logit Demand');

    // 2. Agents (Orbiting)
    createNode('agent1', new THREE.SphereGeometry(0.8, 32, 32), solidMaterial, [-5, 0, -3], 'Heuristic Agent', 'Rule-based');
    createNode('agent2', new THREE.SphereGeometry(0.8, 32, 32), solidMaterial, [5, 0, -3], 'LLM Agent', 'Llama 3');
    createNode('agent3', new THREE.SphereGeometry(0.8, 32, 32), solidMaterial, [4, 0, 4], 'RL Agent', 'Q-Learning');
    const ragAgent = createNode('agent4', new THREE.SphereGeometry(0.8, 32, 32), solidMaterial, [-4, 0, 5], 'RAG Agent', 'Hybrid Memory');

    // 3. Database Layer (Below)
    createNode('database', new THREE.CylinderGeometry(2, 2, 0.5, 32), solidMaterial, [0, -4, 0], 'PostgreSQL', 'pgvector embeddings');

    // 4. Regulator (Above)
    createNode('regulator', new THREE.OctahedronGeometry(1.5, 0), glassMaterial, [0, 5, 0], 'Antitrust Regulator', 'λ Monitor & Shocks');

    // 5. Dashboard (Top)
    createNode('dashboard', new THREE.PlaneGeometry(6, 3), glassMaterial, [0, 9, 0], 'Live Dashboard', 'WebSocket Stream');
    objects.dashboard.rotation.x = -Math.PI * 0.1;

    // ── Particle System (Data Flow) ──
    function createFlow(fromId, toId, colorHex, count = 20) {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ color: colorHex, size: 0.1, transparent: true, opacity: 0 });
        const points = new THREE.Points(geo, mat);
        scene.add(points);
        
        particleSystems.push({
            points,
            from: objects[fromId],
            to: objects[toId],
            progress: Array.from({length: count}, () => Math.random())
        });
        return points;
    }

    const flowAgentsToEngine = [
        createFlow('agent1', 'engine', 0xffffff),
        createFlow('agent2', 'engine', 0xffffff),
        createFlow('agent3', 'engine', 0xffffff),
        createFlow('agent4', 'engine', 0xffffff)
    ];
    const flowDbToRag = createFlow('database', 'agent4', 0x10B981, 40);
    const flowEngineToReg = createFlow('engine', 'regulator', 0xF43F5E);
    const flowEngineToDash = createFlow('engine', 'dashboard', 0x6366F1, 50);

    // ── GSAP Cinematic Timeline ──
    
    // We create a master timeline that lasts ~45 seconds
    const tl = gsap.timeline({
        paused: true,
        onUpdate: function() {
            document.getElementById('progressBar').style.width = (this.progress() * 100) + '%';
        }
    });

    // Camera targets for smooth panning
    const camTarget = new THREE.Vector3(0, 0, 0);
    let currentLookAt = new THREE.Vector3(0, 0, 0);

    // Initial state setup
    tl.set(htmlLabels.map(l => l.div), { opacity: 0, y: 10 });
    
    // Sequence 1: Intro (0s - 4s)
    tl.to(camera.position, { z: 15, duration: 4, ease: "power2.inOut" }, 0)
      .to(objects.engine.scale, { x: 1, y: 1, z: 1, duration: 2, ease: "back.out(1.5)" }, 0.5)
      .to(htmlLabels.find(l => l.mesh === objects.engine).div, { opacity: 1, y: 0, duration: 1 }, 1);

    // Sequence 2: Agents Appear & Pricing starts (4s - 10s)
    tl.to([objects.agent1.scale, objects.agent2.scale, objects.agent3.scale, objects.agent4.scale], 
          { x: 1, y: 1, z: 1, duration: 1.5, stagger: 0.2, ease: "back.out(1.2)" }, 3)
      .to(htmlLabels.filter(l => l.mesh !== objects.engine).map(l => l.div), 
          { opacity: 1, y: 0, duration: 1, stagger: 0.1 }, 3.5)
      // Turn on particles
      .to(flowAgentsToEngine.map(f => f.material), { opacity: 0.8, duration: 1 }, 4.5);

    // Sequence 3: RAG Memory Deep Dive (10s - 18s)
    tl.to(camTarget, { x: -4, y: 0, z: 5, duration: 3, ease: "power3.inOut" }, 9)
      .to(camera.position, { x: -4, y: 2, z: 10, duration: 3, ease: "power3.inOut" }, 9)
      // Show Database
      .to(objects.database.scale, { x: 1, y: 1, z: 1, duration: 1.5, ease: "power2.out" }, 10.5)
      .to(flowDbToRag.material, { opacity: 1, duration: 1 }, 11)
      // Agent material lights up
      .to(objects.agent4.material, { emissiveIntensity: 0.8, emissive: new THREE.Color(0x10B981), duration: 1 }, 12);

    // Sequence 4: Reasoning Scratchpad (18s - 24s)
    tl.to('#scratchpad', { opacity: 1, x: 0, duration: 1, ease: "power2.out" }, 13)
      .to('#scratchpad', { opacity: 0, x: 20, duration: 1, ease: "power2.in" }, 18);

    // Sequence 5: Collusion Emerges (24s - 32s)
    tl.to(camTarget, { x: 0, y: 0, z: 0, duration: 3, ease: "power2.inOut" }, 18.5)
      .to(camera.position, { x: 0, y: 3, z: 16, duration: 3, ease: "power2.inOut" }, 18.5)
      // Turn off DB flow, agent dim
      .to(flowDbToRag.material, { opacity: 0, duration: 1 }, 18.5)
      .to(objects.agent4.material, { emissiveIntensity: 0, duration: 1 }, 18.5)
      // Gauge appears
      .to('#lambda-gauge', { opacity: 1, scale: 1, duration: 1, ease: "back.out(1.5)" }, 20)
      // Animate Lambda value via dummy object
      .to({ val: 0 }, { 
          val: 20.6, 
          duration: 4, 
          ease: "power1.inOut",
          onUpdate: function() { 
              document.getElementById('lambda-val').innerText = this.targets()[0].val.toFixed(1); 
          }
      }, 21)
      // Turn gauge red
      .add(() => document.getElementById('lambda-gauge').classList.add('danger'), 23);

    // Sequence 6: Regulator & Shock (32s - 40s)
    tl.to(objects.regulator.scale, { x: 1, y: 1, z: 1, duration: 1.5, ease: "back.out(1.2)" }, 26)
      .to(flowEngineToReg.material, { opacity: 0.8, duration: 1 }, 27)
      // Shock hits Agent 2
      .to(objects.agent2.material, { emissiveIntensity: 1, emissive: new THREE.Color(0xef4444), duration: 0.2 }, 29)
      .to(objects.agent2.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 0.2, yoyo: true, repeat: 1 }, 29)
      // Ripples to other agents
      .to([objects.agent1.material, objects.agent3.material, objects.agent4.material], 
          { emissiveIntensity: 0.4, emissive: new THREE.Color(0xef4444), duration: 0.5, stagger: 0.1 }, 29.5)
      .to([objects.agent1.material, objects.agent2.material, objects.agent3.material, objects.agent4.material], 
          { emissiveIntensity: 0, duration: 2 }, 31);

    // Sequence 7: Dashboard (40s - 48s)
    tl.to(camTarget, { x: 0, y: 4, z: 0, duration: 4, ease: "power2.inOut" }, 33)
      .to(camera.position, { x: 0, y: 8, z: 22, duration: 4, ease: "power2.inOut" }, 33)
      .to(objects.dashboard.scale, { x: 1, y: 1, z: 1, duration: 1.5, ease: "power2.out" }, 35)
      .to(flowEngineToDash.material, { opacity: 0.6, duration: 1 }, 35.5)
      .to('#lambda-gauge', { opacity: 0, duration: 1 }, 33);

    // Sequence 8: Epic Vertical Pull-out (48s - 55s)
    tl.to(camTarget, { x: 0, y: 2, z: 0, duration: 5, ease: "power3.inOut" }, 40)
      .to(camera.position, { x: 0, y: 6, z: 32, duration: 5, ease: "power3.inOut" }, 40)
      .to(objects.database.scale, { x: 1, y: 1, z: 1, duration: 1 }, 40) // Make sure DB is visible in wide shot
      .to(htmlLabels.map(l => l.div), { opacity: 1, duration: 1 }, 40); // Ensure all labels visible

    // ── Controls Logic ──
    const playBtn = document.getElementById('playBtn');
    const replayBtn = document.getElementById('replayBtn');
    const iconPlay = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');

    let isPlaying = true;
    tl.play(); // Auto-start

    playBtn.addEventListener('click', () => {
        if (isPlaying) {
            tl.pause();
            iconPause.style.display = 'none';
            iconPlay.style.display = 'block';
        } else {
            tl.play();
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
        }
        isPlaying = !isPlaying;
    });

    replayBtn.addEventListener('click', () => {
        tl.restart();
        isPlaying = true;
        iconPlay.style.display = 'none';
        iconPause.style.display = 'block';
        document.getElementById('lambda-gauge').classList.remove('danger');
        document.getElementById('lambda-val').innerText = '0.0';
    });

    // ── Render Loop ──
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const time = clock.getElapsedTime();

        // Smooth camera lookAt tracking
        currentLookAt.lerp(camTarget, 0.05);
        camera.lookAt(currentLookAt);

        // Gentle floating for all objects
        Object.values(objects).forEach((mesh, index) => {
            // Store initial Y if not stored
            if(mesh.userData.baseY === undefined) mesh.userData.baseY = mesh.position.y;
            mesh.position.y = mesh.userData.baseY + Math.sin(time * 1.5 + index) * 0.15;
            
            // Subtle rotation
            if(mesh !== objects.dashboard && mesh !== objects.database) {
                mesh.rotation.y += 0.005;
                mesh.rotation.x += 0.002;
            }
        });

        // Animate Particle Flows
        particleSystems.forEach(sys => {
            const positions = sys.points.geometry.attributes.position.array;
            
            for(let i=0; i<sys.progress.length; i++) {
                sys.progress[i] += delta * 0.5; // speed
                if(sys.progress[i] > 1) sys.progress[i] = 0;
                
                const t = sys.progress[i];
                // Simple linear interpolation between nodes
                const start = sys.from.position;
                const end = sys.to.position;
                
                positions[i*3] = start.x + (end.x - start.x) * t;
                positions[i*3+1] = start.y + (end.y - start.y) * t;
                positions[i*3+2] = start.z + (end.z - start.z) * t;
            }
            sys.points.geometry.attributes.position.needsUpdate = true;
        });

        // Sync HTML Labels to 3D positions
        htmlLabels.forEach(item => {
            if (item.div.style.opacity === '0') return; // Skip calculation if invisible

            const vector = item.mesh.position.clone();
            // Offset label to be above the object
            vector.y += 1.2; 
            vector.project(camera);

            const x = (vector.x * .5 + .5) * window.innerWidth;
            const y = (vector.y * -.5 + .5) * window.innerHeight;

            if (vector.z < 1) { // In front of camera
                item.div.style.transform = `translate(-50%, -50%) translate(${x}px,${y}px)`;
                item.div.style.display = 'block';
            } else {
                item.div.style.display = 'none';
            }
        });

        renderer.render(scene, camera);
    }

    animate();

    // ── Resize Handler ──
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    </script>
</body>
</html>
