<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO — Futuristic 3D Architecture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #0ea5e9;
            --secondary: #8b5cf6;
            --danger: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
            --bg-color: #020617;
            --glass-bg: rgba(2, 6, 23, 0.65);
            --glass-border: rgba(14, 165, 233, 0.3);
        }

        body {
            background: var(--bg-color);
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            user-select: none;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(2, 6, 23, 1) 0%, rgba(2, 6, 23, 0.95) 100%);
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            cursor: crosshair;
        }

        /* ── Scanlines Overlay ── */
        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.3;
        }

        /* ── HUD Header ── */
        .header {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            pointer-events: none;
        }
        .header > * { pointer-events: auto; }
        .logo-box {
            position: relative;
            padding: 0.5rem 1.5rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--primary);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
        }
        .logo-box h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary);
            margin: 0;
        }
        .logo-box span { color: var(--primary); }
        .system-status {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem 1rem;
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .status-dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* ── HUD Info Panel ── */
        .info-panel {
            position: fixed;
            right: -450px;
            top: 2rem;
            bottom: 2rem;
            width: 400px;
            z-index: 200;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(2, 6, 23, 0.95) 100%);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-right: none;
            border-left: 2px solid var(--primary);
            padding: 2rem;
            transition: right 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .info-panel.visible { right: 0; }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 1rem;
        }
        .close-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 32px; height: 32px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .close-btn:hover {
            background: var(--danger);
            border-color: var(--danger);
            box-shadow: 0 0 15px var(--danger);
        }
        
        .phase-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .info-panel h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            margin-bottom: 0.5rem;
        }
        .info-panel .subtitle {
            color: #cbd5e1;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .data-box {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 4px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        .data-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 3px; height: 100%;
            background: var(--node-color, var(--primary));
        }
        .data-box h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 0.8rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .data-box h3::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
        }

        .file-list { list-style: none; }
        .file-list li {
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #38bdf8;
            padding: 6px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-list li::before {
            content: '>'; color: #64748b;
        }
        
        .result-content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e2e8f0;
        }
        .result-content strong { color: #fff; font-weight: 600; }
        .result-content .highlight {
            color: var(--node-color, var(--primary));
            text-shadow: 0 0 8px var(--node-color, var(--primary));
        }

        /* ── Controls Hint ── */
        .controls-hint {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--glass-bg);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            padding: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            color: #64748b;
            z-index: 100;
        }
        .controls-hint p { margin: 4px 0; }
        .controls-hint span { color: #cbd5e1; font-weight: bold; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div id="canvas-container"></div>

    <div class="header">
        <div class="logo-box">
            <h1>ECHO <span>// VIZ</span></h1>
        </div>
        <div class="system-status">
            <div class="status-dot"></div>
            SYS.ONLINE | RENDER.ACTIVE | T:<span id="time-display">00:00</span>
        </div>
    </div>

    <div class="controls-hint">
        <p><span>LEFT CLICK + DRAG</span> : ORBIT</p>
        <p><span>RIGHT CLICK + DRAG</span> : PAN</p>
        <p><span>SCROLL</span> : ZOOM IN/OUT</p>
        <p><span>CLICK NODE</span> : INSPECT MODULE</p>
    </div>

    <div class="info-panel" id="infoPanel">
        <div class="panel-header">
            <div>
                <div class="phase-tag" id="panelPhase">PHASE</div>
                <h2 id="panelTitle">Module Name</h2>
            </div>
            <button class="close-btn" id="closePanel">X</button>
        </div>
        <p class="subtitle" id="panelSubtitle">Module description goes here.</p>
        
        <div class="data-box" id="dataBoxFiles">
            <h3>SOURCE FILES</h3>
            <ul class="file-list" id="panelFiles"></ul>
        </div>

        <div class="data-box" id="dataBoxResults">
            <h3>SYSTEM OUTPUT</h3>
            <div class="result-content" id="panelResult"></div>
        </div>
    </div>

    <!-- Three.js + PostProcessing dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
    /* ═══════════════════════════════════════════════════════
       ECHO — Futuristic 3D Architecture
       Advanced Three.js scene with Bloom, OrbitControls, and Bezier curves
       ═══════════════════════════════════════════════════════ */

    // ── Data Definition ──
    const NODES = {
        engine: {
            label: 'MARKET ENGINE',
            phase: 'PHASE 1',
            color: 0x0ea5e9, // primary blue
            pos: [0, 0, 0],
            size: 2.5,
            type: 'core',
            subtitle: 'The central simulation loop — executes N rounds of the Bertrand pricing game with a Multinomial Logit (MNL) demand model.',
            files: ['market/demand.py', 'market/engine.py'],
            result: 'Computes market shares via softmax.<br><br>• <span class="highlight">Nash Eq (Competitive)</span>: $1.52<br>• <span class="highlight">Monopoly (Cartel)</span>: $1.60<br>• <span class="highlight">Collusion Index (λ)</span>: (p̄ − Nash) / (Mono − Nash)',
        },
        agents: {
            label: 'AI AGENTS (N=5)',
            phase: 'PHASE 3 & 6',
            color: 0x8b5cf6, // purple
            pos: [-8, 4, 3],
            size: 2.0,
            type: 'satellite',
            subtitle: 'Autonomous pricing actors: Heuristic, LLM (Llama 3), Q-Learning (RL), and RAG-enhanced LLM.',
            files: ['agents/llm_agent.py', 'agents/rl_agent.py', 'agents/heuristic_agent.py', 'agents/rag_agent.py'],
            result: '<strong>LLM Agents: <span class="highlight">λ = 20.6</span></strong><br>Priced at 2× the Nash equilibrium level through tacit coordination without explicit rules.<br><br><strong>RL Agents:</strong> Gradual convergence upward via pure reward optimization.',
        },
        database: {
            label: 'POSTGRES + PGVECTOR',
            phase: 'PHASE 2',
            color: 0x10b981, // emerald
            pos: [0, -6, -3],
            size: 1.8,
            type: 'storage',
            subtitle: 'Persistent storage layer logging all simulation events and vector embeddings.',
            files: ['database/schema.sql', 'database/db.py', 'docker-compose.yml'],
            result: '6 Relational Tables:<br>simulations, rounds, firm_rounds, scratchpads, collusion_alerts, embeddings.<br><br>Stores high-dimensional data for real-time memory retrieval.',
        },
        rag: {
            label: 'HYBRID RAG MEMORY',
            phase: 'PHASE 4',
            color: 0x06b6d4, // cyan
            pos: [-6, -4, -4],
            size: 1.5,
            type: 'processor',
            subtitle: 'Episodic memory system injecting past market states into LLM context.',
            files: ['database/memory.py'],
            result: '<strong>3 Retrieval Strategies:</strong><br>• <span class="highlight">Standard</span>: Pure cosine similarity<br>• <span class="highlight">Hybrid</span>: Vector + SQL WHERE filters<br>• <span class="highlight">Smart</span>: Auto-context selection',
        },
        regulator: {
            label: 'ANTITRUST DETECTIVE',
            phase: 'PHASE 5',
            color: 0xf43f5e, // rose/danger
            pos: [8, 2, 2],
            size: 1.8,
            type: 'analyzer',
            subtitle: 'Multi-modal detection pipeline to identify algorithmic cartels.',
            files: ['regulator/detector.py', 'regulator/nlp_cluster.py', 'regulator/perturbation.py'],
            result: '1. <span class="highlight">λ Monitor</span>: 3-tier price alerts.<br>2. <span class="highlight">NLP Clustering</span>: Cosine similarity of agent scratchpad reasoning.<br>3. <span class="highlight">Demand Shocks</span>: Perturb one firm, observe cross-firm coordination reactions.',
        },
        analysis: {
            label: 'ANALYSIS & VIZ',
            phase: 'PHASE 5.5 & 7',
            color: 0xf59e0b, // amber
            pos: [6, -4, -2],
            size: 1.5,
            type: 'processor',
            subtitle: 'Empirical validation and publication-ready statistical plotting.',
            files: ['analysis/plots.py', 'analysis/real_data.py'],
            result: '<strong>Validation Data:</strong><br>• US Gasoline: <span class="highlight">λ = 0.91</span><br>• Amazon Electronics: <span class="highlight">λ = 0.87</span><br><br>Generates 7 core research figures.',
        },
        api: {
            label: 'FASTAPI SERVER',
            phase: 'PHASE 8',
            color: 0x6366f1, // indigo
            pos: [0, 5, 2],
            size: 1.6,
            type: 'router',
            subtitle: 'Real-time WebSocket and REST routing layer.',
            files: ['api_server.py'],
            result: 'Endpoints:<br>• <span class="highlight">/ws/simulate</span> (Live streaming)<br>• <span class="highlight">/api/shock/{firm}</span> (Intervention)',
        },
        dashboard: {
            label: 'LIVE DASHBOARD',
            phase: 'PHASE 8',
            color: 0xec4899, // pink
            pos: [0, 9, 0],
            size: 2.0,
            type: 'display',
            subtitle: 'Glassmorphism UI to watch AI agents collude live.',
            files: ['dashboard/index.html', 'dashboard/style.css', 'dashboard/script.js'],
            result: 'Features real-time charts, scratchpad viewers, a regulator severity gauge, and interactive demand shock controls.',
        }
    };

    const LINKS = [
        { from: 'agents', to: 'engine', type: 'bidirectional', label: 'Actions / State' },
        { from: 'engine', to: 'database', type: 'down', label: 'Log Data' },
        { from: 'database', to: 'rag', type: 'up', label: 'Embeddings' },
        { from: 'rag', to: 'agents', type: 'up', label: 'Context' },
        { from: 'engine', to: 'regulator', type: 'up', label: 'Observation' },
        { from: 'regulator', to: 'engine', type: 'down', label: 'Shocks' },
        { from: 'database', to: 'analysis', type: 'up', label: 'Query' },
        { from: 'engine', to: 'api', type: 'up', label: 'Stream' },
        { from: 'api', to: 'dashboard', type: 'up', label: 'WebSocket' },
    ];

    // ── Setup Scene, Camera, Renderer ──
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x020617, 0.03);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 25);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    container.appendChild(renderer.domElement);

    // ── Controls ──
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxDistance = 50;
    controls.minDistance = 5;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.5;
    controls.target.set(0, 0, 0);

    // ── Post-Processing (Bloom) ──
    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.5, // strength
        0.4, // radius
        0.85 // threshold
    );
    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // ── Environment (Cyber Grid) ──
    const gridHelper = new THREE.GridHelper(100, 50, 0x0ea5e9, 0x0ea5e9);
    gridHelper.position.y = -10;
    gridHelper.material.opacity = 0.15;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // Particles background
    const pGeo = new THREE.BufferGeometry();
    const pMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.4 });
    const pCount = 2000;
    const pPos = new Float32Array(pCount * 3);
    for(let i=0; i<pCount*3; i++) {
        pPos[i] = (Math.random() - 0.5) * 100;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const particleSystem = new THREE.Points(pGeo, pMat);
    scene.add(particleSystem);

    // ── Node Construction ──
    const nodeMeshes = {};
    const nodeAnimators = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function createFuturisticNode(nodeData, key) {
        const group = new THREE.Group();
        group.position.set(...nodeData.pos);
        group.userData = { id: key, ...nodeData };

        const r = nodeData.size;
        const color = new THREE.Color(nodeData.color);

        // Inner Core (Glowing)
        const coreGeo = new THREE.IcosahedronGeometry(r * 0.4, 1);
        const coreMat = new THREE.MeshBasicMaterial({ color: color });
        const core = new THREE.Mesh(coreGeo, coreMat);
        group.add(core);

        // Outer Wireframe Shell
        const shellGeo = new THREE.IcosahedronGeometry(r, 1);
        const shellMat = new THREE.MeshBasicMaterial({ color: color, wireframe: true, transparent: true, opacity: 0.3 });
        const shell = new THREE.Mesh(shellGeo, shellMat);
        group.add(shell);

        // Rings
        const ringGeo1 = new THREE.TorusGeometry(r * 1.3, 0.02, 16, 64);
        const ringMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.5 });
        const ring1 = new THREE.Mesh(ringGeo1, ringMat);
        ring1.rotation.x = Math.PI / 2;
        group.add(ring1);

        const ringGeo2 = new THREE.TorusGeometry(r * 1.6, 0.01, 16, 64);
        const ring2 = new THREE.Mesh(ringGeo2, ringMat);
        ring2.rotation.y = Math.PI / 3;
        group.add(ring2);

        // HTML Label via CSS2D approach (manual sync)
        const labelDiv = document.createElement('div');
        labelDiv.style.position = 'absolute';
        labelDiv.style.color = '#' + color.getHexString();
        labelDiv.style.fontFamily = "'Orbitron', sans-serif";
        labelDiv.style.fontSize = '12px';
        labelDiv.style.fontWeight = 'bold';
        labelDiv.style.letterSpacing = '1px';
        labelDiv.style.textShadow = `0 0 5px ${labelDiv.style.color}`;
        labelDiv.style.pointerEvents = 'none';
        labelDiv.innerText = nodeData.label;
        document.body.appendChild(labelDiv);

        scene.add(group);
        nodeMeshes[key] = { group, core, shell, ring1, ring2, labelDiv };

        // Animation logic
        nodeAnimators.push((t) => {
            group.position.y = nodeData.pos[1] + Math.sin(t * 2 + nodeData.pos[0]) * 0.3;
            core.rotation.x = t;
            core.rotation.y = t * 1.5;
            shell.rotation.x = -t * 0.5;
            shell.rotation.y = -t * 0.2;
            ring1.rotation.x = (Math.PI / 2) + Math.sin(t) * 0.2;
            ring1.rotation.y = Math.cos(t * 0.5) * 0.2;
            ring2.rotation.z = t * 0.8;

            // Sync HTML label position
            const vector = new THREE.Vector3();
            vector.setFromMatrixPosition(group.matrixWorld);
            vector.y += r * 1.2; // slightly above
            vector.project(camera);

            const x = (vector.x * .5 + .5) * window.innerWidth;
            const y = (vector.y * -.5 + .5) * window.innerHeight;
            
            if (vector.z < 1) { // in front of camera
                labelDiv.style.transform = `translate(-50%, -50%) translate(${x}px,${y}px)`;
                labelDiv.style.display = 'block';
                labelDiv.style.opacity = (1 - vector.z) * 2; // fade in distance
            } else {
                labelDiv.style.display = 'none';
            }
        });

        // Invisible hit box for raycasting
        const hitGeo = new THREE.SphereGeometry(r * 1.8, 16, 16);
        const hitMat = new THREE.MeshBasicMaterial({ visible: false });
        const hitMesh = new THREE.Mesh(hitGeo, hitMat);
        hitMesh.userData = { id: key };
        group.add(hitMesh);
    }

    Object.keys(NODES).forEach(key => createFuturisticNode(NODES[key], key));

    // ── Connections (Bezier Curves & Data Packets) ──
    const pathAnimators = [];
    
    LINKS.forEach(link => {
        const fromPos = new THREE.Vector3(...NODES[link.from].pos);
        const toPos = new THREE.Vector3(...NODES[link.to].pos);
        const midPos = fromPos.clone().lerp(toPos, 0.5);
        midPos.y += 3; // Arc height

        const curve = new THREE.QuadraticBezierCurve3(fromPos, midPos, toPos);
        const points = curve.getPoints(50);
        
        // Link Line
        const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
        const lineMat = new THREE.LineBasicMaterial({ 
            color: NODES[link.from].color, 
            transparent: true, 
            opacity: 0.2 
        });
        const line = new THREE.Line(lineGeo, lineMat);
        scene.add(line);

        // Data Packets (Glowing spheres travelling along curve)
        const packetCount = 3;
        for(let i=0; i<packetCount; i++) {
            const pGeo = new THREE.SphereGeometry(0.15, 8, 8);
            const pMat = new THREE.MeshBasicMaterial({ color: NODES[link.from].color });
            const packet = new THREE.Mesh(pGeo, pMat);
            scene.add(packet);

            let t = i / packetCount;
            pathAnimators.push((delta) => {
                t += delta * 0.2;
                if(t > 1) t = 0;
                
                // Get position on curve
                const pos = curve.getPointAt(t);
                
                // Account for node Y bobbing dynamically
                const yBobFrom = nodeMeshes[link.from].group.position.y - NODES[link.from].pos[1];
                const yBobTo = nodeMeshes[link.to].group.position.y - NODES[link.to].pos[1];
                pos.y += THREE.MathUtils.lerp(yBobFrom, yBobTo, t);

                packet.position.copy(pos);
            });
        }
    });

    // ── Interaction ──
    const infoPanel = document.getElementById('infoPanel');
    const closeBtn = document.getElementById('closePanel');
    
    function updatePanel(key) {
        const data = NODES[key];
        const colorHex = '#' + data.color.toString(16).padStart(6, '0');
        
        document.documentElement.style.setProperty('--node-color', colorHex);
        
        document.getElementById('panelPhase').innerText = data.phase;
        document.getElementById('panelPhase').style.color = colorHex;
        document.getElementById('panelTitle').innerText = data.label;
        document.getElementById('panelSubtitle').innerText = data.subtitle;
        
        const filesHtml = data.files.map(f => `<li>${f}</li>`).join('');
        document.getElementById('panelFiles').innerHTML = filesHtml;
        document.getElementById('panelResult').innerHTML = data.result;

        document.getElementById('dataBoxFiles').style.borderColor = colorHex + '44';
        document.getElementById('dataBoxResults').style.borderColor = colorHex + '44';

        infoPanel.classList.add('visible');

        // Focus camera
        controls.autoRotate = false;
        const targetPos = nodeMeshes[key].group.position;
        // animate camera target
        const startTarget = controls.target.clone();
        let frame = 0;
        function animTarget() {
            frame++;
            const a = frame / 30;
            controls.target.lerpVectors(startTarget, targetPos, a);
            if(frame < 30) requestAnimationFrame(animTarget);
        }
        animTarget();
    }

    closeBtn.addEventListener('click', () => {
        infoPanel.classList.remove('visible');
        controls.autoRotate = true;
    });

    window.addEventListener('pointerdown', (event) => {
        if(event.button !== 0) return; // Only left click selects
        
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        // Collect hit meshes
        const interactables = Object.values(nodeMeshes).map(n => n.group.children[4]); // The invisible hit sphere
        const intersects = raycaster.intersectObjects(interactables);

        if (intersects.length > 0) {
            const key = intersects[0].object.userData.id;
            updatePanel(key);
            
            // Interaction feedback
            const shell = nodeMeshes[key].shell;
            shell.scale.setScalar(1.2);
            setTimeout(() => { shell.scale.setScalar(1.0); }, 200);
        }
    });

    // Cursor pointer on hover
    window.addEventListener('pointermove', (event) => {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const interactables = Object.values(nodeMeshes).map(n => n.group.children[4]);
        const intersects = raycaster.intersectObjects(interactables);
        document.body.style.cursor = intersects.length > 0 ? 'pointer' : 'crosshair';
    });

    // ── Animation Loop ──
    const clock = new THREE.Clock();
    const timeDisplay = document.getElementById('time-display');

    function animate() {
        requestAnimationFrame(animate);
        
        const delta = clock.getDelta();
        const elapsed = clock.getElapsedTime();

        controls.update();

        // Update Nodes
        nodeAnimators.forEach(anim => anim(elapsed));
        
        // Update Data Packets
        pathAnimators.forEach(anim => anim(delta));

        // Rotate background particles slowly
        particleSystem.rotation.y = elapsed * 0.05;

        // Update HUD time
        const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
        const secs = Math.floor(elapsed % 60).toString().padStart(2, '0');
        timeDisplay.innerText = `${mins}:${secs}`;

        composer.render();
    }

    animate();

    // ── Handle Resize ──
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

    </script>
</body>
</html>
